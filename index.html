<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="흩어진 앨범 커버와 사적인 감상으로 만든 lo-fi 바이닐 아카이브"
    />
    <title>music</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="next-link" href="movie.html">movie</a>

    <main class="archive-floor" id="archiveFloor">
      <section class="album-layer" aria-label="흩어진 앨범 커버"></section>
    </main>

    <aside class="now-playing" id="nowPlaying" aria-hidden="true" aria-live="polite">
      <button class="panel-close" type="button" id="panelClose" aria-label="now playing 패널 닫기">
        ×
      </button>
      <div class="panel-grid">
        <img class="panel-cover" id="panelCover" alt="" />
        <div class="panel-copy">
          <h2 id="panelTitle">click cover</h2>
          <p id="panelArtist"></p>
          <a class="youtube-link" id="youtubeLink" href="#" target="_blank" rel="noopener">
            youtube
          </a>
        </div>
      </div>
    </aside>

    <script src="script.js"></script>
