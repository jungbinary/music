<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="흩어진 앨범 커버와 사적인 감상으로 만든 lo-fi 바이닐 아카이브"
    />
    <title>music</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23070605'/%3E%3Ccircle cx='16' cy='16' r='13' fill='%23120f0c' stroke='%238b7650' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23d4c3a1'/%3E%3Cpath d='M21 7v13.3a4.2 4.2 0 1 1-2-3.55V10.5l-7 1.45v9.35a4.2 4.2 0 1 1-2-3.55V10l11-2.25Z' fill='%23c7b17a'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="home-link" href="https://github.com/jungbinary" aria-label="jungbinary github home">
      <svg aria-hidden="true" viewBox="0 0 32 32">
        <path d="M5 15.5 16 6l11 9.5" />
        <path d="M8.5 14.5v11h15v-11" />
        <path d="M13.2 25.5v-7h5.6v7" />
      </svg>
    </a>

    <main class="archive-floor" id="archiveFloor">
      <section class="album-layer" aria-label="흩어진 앨범 커버"></section>
    </main>

    <aside class="now-playing" id="nowPlaying" aria-hidden="true" aria-live="polite">
      <button class="panel-close" type="button" id="panelClose" aria-label="now playing 패널 닫기">
        ×
      </button>
      <div class="panel-grid">
        <img class="panel-cover" id="panelCover" alt="" />
        <div class="panel-copy">
          <h2 id="panelTitle">click cover</h2>
          <p id="panelArtist"></p>
        </div>
      </div>
      <iframe
        class="audio-player"
        id="audioPlayer"
        title="song player"
        allow="autoplay; encrypted-media"
      ></iframe>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
